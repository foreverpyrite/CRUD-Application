services:
  mysql-db:
    image: docker.io/mysql:latest
    container_name: mysql-java-app
    restart: always
    environment:
      # Mimics XAMPP behavior (no password)
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: java_crud_db
    ports:
      - "3306:3306"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./mysql_data:/var/lib/mysql

